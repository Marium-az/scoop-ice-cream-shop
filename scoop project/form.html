<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order | Scoop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="form.css">
</head>
<body>
<nav class="navbar navbar-expand-lg sticky-top">
    <div class="container">
        <a class="navbar-brand" href="index.html">Sc<span class="first-o">o</span><span class="secnd-o">o</span>p</a>
        
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#iceCreamNav">
        <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="iceCreamNav">
        <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="index.html#about">About</a></li>
            <li class="nav-item"><a class="nav-link" href="flavors.html">Flavors</a></li>
            <li class="nav-item"><a class="nav-link" href="index.html#reviews">Reviews</a></li>
            <li class="nav-item"><a class="nav-link ordr" href="form.html">Order Now</a></li>
        </ul>
        </div>
    </div>
  </div>
</nav>

<div class="color-text container mt-4 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            
            <h5 class="text-center emoji">🍦🍧🍨🥮🍪🧁🍫🍡🍮🍇🍒🍓🍌</h5>
            <h2 class="text-center mb-4 fw-bold">Let's Order Your Scoops!</h2>

            <form action="ty.html">
                
                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" class="bordered form-control" placeholder="Enter your name" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="bordered form-control" placeholder="Enter your email" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Delivery Address</label>
                    <textarea class="bordered form-control" rows="2" placeholder="Where should we send the ice cream?" required></textarea>
                </div>
                
                <label class="mb-4">Select Your Flavors</label>
                <div class=" bordered card p-4">
                    <div id="flavor-list">
                        <div class="row g-2 mb-3 flavor-row">
                            <div class="col-7">
                                <select class="textt form-select">
                                    <option class="textt" value="200">Midnight Cacao - Rs. 200</option>
                                    <option class="textt" value="200">Vanilla Bean - Rs. 200</option>
                                    <option class="textt" value="200">Wild Berry Bliss - Rs. 200</option>
                                    <option class="textt" value="200">Salted Caramel - Rs. 200</option>
                                    <option class="textt" value="200">Cool Peppermint - Rs. 200</option>
                                    <option class="textt" value="275">Mango Sorbet - Rs. 275</option>
                                </select>
                            </div>
                            <div class="col-3">
                                <input type="number" class="textt form-control" value="1" min="1">
                            </div>
                            <div class="col-2">
                                <button type="button" class="remove-btn btn w-100" onclick="this.parentElement.parentElement.remove()">X</button>
                            </div>
                        </div>
                    </div>

                    <button type="button" class="btn add-order-btn btn-sm mt-2" onclick="addFlavor()">Add A Flavor</button>
                </div>

                <div class="mt-3">
                    <label class="form-label fw-bold">Any special toppings or requests?</label>
                    <textarea class="form-control" rows="2" placeholder="e.g. Extra sprinkles, please!"></textarea>
                </div>

                <hr>
                
                <h5 class="mb-3">Payment Info</h5>
                <div class="my-3">
                    <div class="form-check">
                        <input id="credit" name="paymentMethod" type="radio" class="form-check-input" checked required>
                        <label class="form-check-label" for="credit">Credit card</label>
                    </div>
                    <div class="form-check">
                        <input id="paypal" name="paymentMethod" type="radio" class="form-check-input" required>
                        <label class="form-check-label" for="paypal">PayPal</label>
                    </div>
                    <div class="form-check">
                        <input id="stripe" name="paymentMethod" type="radio" class="form-check-input" required>
                        <label class="form-check-label" for="stripe">Stripe</label>
                    </div>
                </div>

                <div class="mb-3">
                    <input type="text" class="form-control" placeholder="Card Number (16 digits)" required>
                </div>

                <div class="card p-4 mt-3">
                    <div class="d-flex justify-content-between align-items-center">
                        <h5 class="texttt mb-0">Grand Total:</h5>
                        <h5 class="texttt mb-0">Rs.<span id="grand-total">200</span></h5>
                    </div>
                </div>

                <button type="submit" class="btn place-order-btn w-100 mt-4 py-2">
                    Place My Order!
                </button>

            </form>
        </div>
    </div>
</div>

<footer class="footer pt-3 pb-5">
    <div class="container">
        <div class="row">
            <div class="col-md-6">
                <h4 class="scoop-footer">Sc<span class="first-o">o</span><span class="secnd-o">o</span>p</h4>
                <p class="footer-text small">Bringing happiness to your doorstep, one scoop at a time.</p>
            </div>
            <div class="col-md-6 text-md-end">
                <p class="footer-text">Follow us on <a class="link" href="https://www.instagram.com/">Instagram</a> | <a class="link" href="https://www.facebook.com/">Facebook</a></p>
                <p class="small footer-text">&copy; 2026 Scoop Ice Cream Shop</p>
            </div>
        </div>
    </div>
</footer>

</body>

<script>
    function addFlavor() {
        const list = document.getElementById('flavor-list')
        const firstRow = document.querySelector('.flavor-row')
        const newRow = firstRow.cloneNode(true)

        newRow.querySelector('input').value = 1
        
        newRow.querySelector('.form-select').onchange = updateTotal
        newRow.querySelector('input').oninput = updateTotal

        list.appendChild(newRow)
        updateTotal()
    }

    function updateTotal() {
        let total = 0;
        const rows = document.querySelectorAll('.flavor-row')

        rows.forEach(row => {
            const selectElement = row.querySelector('.form-select')
            const price = parseFloat(selectElement.value)
            const quantity = parseInt(row.querySelector('input[type="number"]').value)
            
            if (!isNaN(price) && !isNaN(quantity)) {
                total += price * quantity
            }
        })

        document.getElementById('grand-total').innerText = total
    }
</script>

</html>
